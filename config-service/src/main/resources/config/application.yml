spring:
  datasource:
    username: postgres
    password: ${USER_PASSWORD}


  jpa:
    hibernate:
      ddl-auto: update

    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        highlight_sql: true
#        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3_600_000 # 1 hour
  refresh-token: 86_400_000 # 24 hours

